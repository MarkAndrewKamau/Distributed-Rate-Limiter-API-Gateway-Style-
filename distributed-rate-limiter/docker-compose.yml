version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: rate_limiter_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: rate_limiter_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - rate-limiter
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  rate-limiter:
    build: .
    container_name: rate_limiter_app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
      RATE_LIMIT_CAPACITY: 10
      RATE_LIMIT_REFILL_RATE_PER_SECOND: 5
      RATE_LIMIT_REQUEST_COST: 1
      RATE_LIMIT_POLICY_CACHE_TTL_MS: 5000
      RATE_LIMIT_FAIL_OPEN: "true"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  redis_data:
